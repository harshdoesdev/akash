<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>akash alpha — आकाश</title>
    <meta name="description" content="Akash alpha build: a tranquil drone flight through a painterly sky meadow." />
    <link rel="icon" type="image/png" href="./branding/akash-icon.png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0a;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #app { position: fixed; inset: 0; }
      #hud, #controls {
        position: fixed;
        left: 16px;
        color: #fff;
        font-size: 13px;
        line-height: 1.7;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        user-select: none;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      #hud { top: 16px; }
      #controls { bottom: 16px; font-size: 12px; color: rgba(255, 255, 255, 0.75); }
      body.in-game #hud, body.in-game #controls { opacity: 1; }

      /* ---- Racing: lap timer top-center, one airy message line below ---- */
      #race-hud {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        user-select: none;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      body.in-game #race-hud.active { opacity: 1; }
      #race-msg {
        position: fixed;
        top: 24%;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", Quicksand, Avenir, sans-serif;
        font-size: 17px;
        letter-spacing: 0.26em;
        text-indent: 0.26em;
        color: #fff;
        text-shadow: 0 2px 14px rgba(20, 50, 90, 0.6);
        user-select: none;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.6s ease;
      }
      body.in-game #race-msg.show { opacity: 1; }

      /* ---- Screen system: overlays crossfading over the live world ---- */
      .screen {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.45s ease;
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", Quicksand, Avenir, sans-serif;
        user-select: none;
      }
      .screen.active { opacity: 1; pointer-events: auto; }

      /* Soft shade so text sits on the live world without hiding it. */
      .menu-shade {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 50% 45%, rgba(20, 40, 70, 0.0) 30%, rgba(20, 40, 70, 0.38) 100%),
          linear-gradient(180deg, rgba(20, 40, 70, 0.25), rgba(20, 40, 70, 0) 30%);
      }
      .panel-inner { position: relative; text-align: center; color: #fff; }
      .brand-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        margin-bottom: 18px;
      }
      .brand-wordmark {
        width: min(520px, 78vw);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 10px 24px rgba(15, 45, 90, 0.28));
      }

      .menu-kana {
        font-size: 20px;
        letter-spacing: 0.4em;
        margin-left: 0.4em;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 2px 14px rgba(20, 50, 90, 0.6);
        margin-bottom: 6px;
      }
      .menu-title {
        font-size: 54px;
        font-weight: 600;
        letter-spacing: 0.18em;
        margin-left: 0.18em;
        text-shadow: 0 3px 24px rgba(20, 50, 90, 0.65);
      }
      .menu-sub {
        font-size: 13px;
        letter-spacing: 0.3em;
        margin-left: 0.3em;
        color: rgba(255, 255, 255, 0.88);
        margin-top: 6px;
        margin-bottom: 32px;
      }
      .alpha-pill {
        position: fixed;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        font-size: 10px;
        letter-spacing: 0.2em;
        text-indent: 0.2em;
        color: rgba(255, 247, 226, 0.74);
        text-transform: uppercase;
        text-shadow: 0 1px 8px rgba(15, 45, 90, 0.28);
      }
      /* Liquid glass: frosted translucent pills and cards over the live
         world — light blur, hairline highlight, nothing heavy. */
      .menu-buttons { display: flex; flex-direction: column; gap: 12px; align-items: center; }
      .menu-buttons button, .panel-buttons button {
        font: inherit;
        font-size: 15px;
        letter-spacing: 0.22em;
        text-indent: 0.22em;
        color: #ffffff;
        text-shadow: 0 1px 6px rgba(20, 50, 90, 0.4);
        background: rgba(255, 255, 255, 0.26);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-top-color: rgba(255, 255, 255, 0.65);
        border-radius: 99px;
        padding: 11px 0;
        width: 220px;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(20, 50, 90, 0.18);
        transition: transform 0.15s ease, background 0.15s ease;
      }
      .menu-buttons button:hover, .panel-buttons button:hover {
        background: rgba(255, 255, 255, 0.38);
        transform: translateY(-1px);
      }
      /* Pilot line: name + paint dots, one whisper of text under the
         buttons. Same voice as the world line below it. */
      .menu-pilot {
        margin-top: 26px;
        display: flex;
        gap: 12px;
        justify-content: center;
        align-items: center;
        font-size: 11px;
        letter-spacing: 0.24em;
      }
      .menu-pilot input {
        font: inherit;
        text-align: center;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 1px 6px rgba(20, 50, 90, 0.4);
        background: none;
        border: none;
        border-bottom: 1px dotted rgba(255, 255, 255, 0.45);
        padding: 0 2px 1px;
        width: 110px;
        outline: none;
        transition: border-color 0.15s ease;
      }
      .menu-pilot input:hover, .menu-pilot input:focus {
        border-bottom-color: rgba(255, 255, 255, 0.9);
      }
      .menu-pilot input::placeholder { color: rgba(255, 255, 255, 0.55); }
      .pilot-colors { display: inline-flex; gap: 8px; align-items: center; }
      .color-dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: none;
        outline: 1.5px solid transparent;
        outline-offset: 2px;
        cursor: pointer;
        padding: 0;
        box-shadow: 0 1px 5px rgba(20, 50, 90, 0.3);
        transition: transform 0.15s ease, outline-color 0.15s ease;
      }
      .color-dot:hover { transform: scale(1.2); }
      .color-dot.sel { outline-color: rgba(255, 255, 255, 0.95); }

      /* World-code line: the code itself is quietly editable (enter to
         fly there), "new" and "invite" are bare text actions. */
      .menu-world {
        margin-top: 10px;
        display: flex;
        gap: 7px;
        justify-content: center;
        align-items: baseline;
        font-size: 11px;
        letter-spacing: 0.24em;
        color: rgba(255, 255, 255, 0.7);
      }
      .menu-world input {
        font: inherit;
        color: rgba(255, 255, 255, 0.95);
        text-shadow: 0 1px 6px rgba(20, 50, 90, 0.4);
        background: none;
        border: none;
        border-bottom: 1px dotted rgba(255, 255, 255, 0.45);
        padding: 0 2px 1px;
        width: 8ch;
        outline: none;
        transition: border-color 0.15s ease;
      }
      .menu-world input:hover, .menu-world input:focus {
        border-bottom-color: rgba(255, 255, 255, 0.9);
      }
      .mw-link {
        font: inherit;
        color: rgba(255, 255, 255, 0.7);
        text-shadow: 0 1px 6px rgba(20, 50, 90, 0.4);
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        transition: color 0.15s ease;
      }
      .mw-link:hover { color: #fff; }
      .mw-dot { color: rgba(255, 255, 255, 0.45); }
      .menu-online {
        margin-top: 10px;
        min-height: 14px;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: rgba(255, 255, 255, 0.75);
      }

      /* Pause + settings share a glass card. */
      .panel-card {
        position: relative;
        background: rgba(255, 255, 255, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-top-color: rgba(255, 255, 255, 0.6);
        border-radius: 26px;
        padding: 34px 44px;
        min-width: 320px;
        box-shadow: 0 12px 50px rgba(20, 50, 90, 0.22);
        color: #ffffff;
        text-shadow: 0 1px 6px rgba(20, 50, 90, 0.35);
        text-align: center;
      }
      .panel-title {
        font-size: 20px;
        letter-spacing: 0.3em;
        text-indent: 0.3em;
        margin-bottom: 24px;
      }
      .panel-buttons { display: flex; flex-direction: column; gap: 10px; align-items: center; }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
        font-size: 12px;
        letter-spacing: 0.18em;
      }
      .slider-row label { width: 90px; text-align: right; }
      .slider-row input[type="range"] {
        flex: 1;
        accent-color: #eaf6e2;
      }

      /* Small corner fullscreen toggle — icon + quiet label, not a pill. */
      .fs-toggle {
        position: fixed;
        right: max(18px, env(safe-area-inset-right));
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 6;
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", Quicksand, Avenir, sans-serif;
        font-size: 10px;
        letter-spacing: 0.18em;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 1px 6px rgba(20, 50, 90, 0.4);
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-top-color: rgba(255, 255, 255, 0.5);
        border-radius: 9px;
        padding: 7px 11px;
        cursor: pointer;
        transition: opacity 0.3s ease, background 0.15s ease;
      }
      .fs-toggle:hover { background: rgba(255, 255, 255, 0.28); }
      .fs-toggle svg { width: 13px; height: 13px; display: block; }
      body.in-game .fs-toggle { opacity: 0; pointer-events: none; }

      /* ---- Touch controls: dual virtual sticks + pause/reset ---- */
      #touch-ui { display: none; }
      body.touch.in-game #touch-ui { display: block; }
      body.touch #controls { display: none; } /* keyboard hints are noise on touch */
      .stick {
        position: fixed;
        bottom: max(30px, env(safe-area-inset-bottom));
        width: 116px;
        height: 116px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        z-index: 4;
      }
      #stick-left { left: max(30px, env(safe-area-inset-left)); }
      #stick-right { right: max(30px, env(safe-area-inset-right)); }
      .stick .nub {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.55);
        pointer-events: none;
      }
      .touch-btns {
        position: fixed;
        top: max(14px, env(safe-area-inset-top));
        right: max(14px, env(safe-area-inset-right));
        display: flex;
        gap: 10px;
        z-index: 4;
      }
      .touch-btns button {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        font-size: 16px;
        color: #fff;
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.35);
      }

      /* Short landscape viewports (phones): the desktop-sized lockup pushes
         the buttons below the fold and nothing scrolls. Compact everything
         so the whole menu fits ~400px of height. */
      @media (max-height: 540px) {
        .brand-wordmark { width: min(300px, 42vw); }
        .brand-lockup { margin-bottom: 6px; }
        .menu-sub { font-size: 11px; margin-top: 2px; margin-bottom: 14px; }
        .menu-buttons { gap: 8px; }
        .menu-buttons button, .panel-buttons button {
          padding: 8px 0;
          width: 190px;
          font-size: 13px;
        }
        .menu-pilot { margin-top: 10px; font-size: 10px; }
        .menu-world { margin-top: 6px; font-size: 10px; }
        .menu-online { margin-top: 6px; font-size: 10px; }
        .alpha-pill { display: none; }
        .panel-card { padding: 16px 28px; min-width: 280px; }
        .panel-title { font-size: 15px; margin-bottom: 10px; }
        .slider-row { margin-bottom: 7px; font-size: 11px; }
        #boot-wordmark { width: min(220px, 34vw); }
      }

      /* Portrait on a touch device: the game is a landscape film. */
      #rotate-hint { display: none; }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-hint {
          position: fixed;
          inset: 0;
          z-index: 30;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          background: linear-gradient(180deg, #2e6ac8 0%, #9fd2e8 58%, #d7e7cf 100%);
          color: #fff;
          font-family: ui-rounded, "Hiragino Maru Gothic ProN", Quicksand, Avenir, sans-serif;
          font-size: 18px;
          letter-spacing: 0.22em;
          text-indent: 0.22em;
          text-shadow: 0 2px 14px rgba(20, 50, 90, 0.5);
        }
        #rotate-hint .turn { font-size: 44px; }
      }

      /* ---- Boot screen (asset preload) ---- */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #2e6ac8 0%, #9fd2e8 58%, #d7e7cf 100%);
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", Quicksand, Avenir, sans-serif;
        transition: opacity 0.9s ease;
        user-select: none;
      }
      #boot.boot-done { opacity: 0; pointer-events: none; }
      #boot-inner { text-align: center; }
      #boot-brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        margin-bottom: 14px;
      }
      #boot-wordmark {
        width: min(320px, 66vw);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 8px 18px rgba(46, 106, 200, 0.26));
      }
      #boot-kana {
        font-size: 16px;
        letter-spacing: 0.5em;
        margin-left: 0.5em;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 8px;
      }
      #boot-title {
        font-size: 34px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: #ffffff;
        text-shadow: 0 2px 18px rgba(46, 106, 200, 0.5);
        margin-bottom: 10px;
      }
      #boot-sub {
        font-size: 12px;
        letter-spacing: 0.24em;
        color: rgba(255, 255, 255, 0.88);
        margin-bottom: 28px;
      }
      #boot-alpha {
        font-size: 10px;
        letter-spacing: 0.22em;
        text-indent: 0.22em;
        color: rgba(255, 247, 226, 0.76);
        text-transform: uppercase;
        text-shadow: 0 1px 10px rgba(46, 106, 200, 0.25);
        margin-bottom: 22px;
      }
      #boot-track {
        width: 190px;
        height: 4px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.35);
        border-radius: 99px;
        overflow: hidden;
      }
      #boot-fill {
        width: 100%;
        height: 100%;
        background: #fff;
        border-radius: 99px;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="race-hud"></div>
    <div id="race-msg"></div>
    <div id="controls">
      W/S forward/back &nbsp; A/D turn &nbsp; ←/→ strafe &nbsp; SPACE up &nbsp; SHIFT down &nbsp; R reset &nbsp; M sound &nbsp; N (hold) time &nbsp; F fullscreen &nbsp; ESC menu
    </div>

    <div class="screen" data-screen="menu">
      <div class="menu-shade"></div>
      <div class="panel-inner">
        <div class="brand-lockup">
          <img class="brand-wordmark" src="./branding/akash-logo-text.png" alt="Akash logo" />
        </div>
        <div class="menu-sub">a sky stroll</div>
        <div class="menu-buttons">
          <button id="btn-fly">fly</button>
          <button id="btn-settings">settings</button>
        </div>
        <div class="menu-pilot">
          <input id="pilot-name" maxlength="14" spellcheck="false" autocomplete="off"
            placeholder="your name" aria-label="pilot name" />
          <span class="pilot-colors" id="pilot-colors" aria-label="drone color"></span>
        </div>
        <div class="menu-world">
          <span>world</span>
          <input id="world-code" spellcheck="false" autocomplete="off" maxlength="24"
            aria-label="world code" title="type any code and press enter to fly there" />
          <button id="btn-world-reroll" class="mw-link" title="fly somewhere new">new</button>
          <span class="mw-dot">&middot;</span>
          <button id="btn-world-copy" class="mw-link" title="copy an invite for a friend">invite</button>
        </div>
        <div class="menu-online" id="menu-online"></div>
      </div>
      <div class="alpha-pill">alpha build</div>
    </div>

    <div class="screen" data-screen="paused">
      <div class="menu-shade"></div>
      <div class="panel-inner">
        <div class="panel-card">
          <div class="panel-title">paused</div>
          <div class="panel-buttons">
            <button id="btn-resume">resume</button>
            <button id="btn-pause-settings">settings</button>
            <button id="btn-main-menu">main menu</button>
          </div>
        </div>
      </div>
    </div>

    <div class="screen" data-screen="settings" id="screen-settings">
      <div class="menu-shade"></div>
      <div class="panel-inner">
        <div class="panel-card">
          <div class="panel-title">sound</div>
          <div class="slider-row"><label>master</label><input type="range" min="0" max="100" data-bus="master" /></div>
          <div class="slider-row"><label>drone</label><input type="range" min="0" max="100" data-bus="drone" /></div>
          <div class="slider-row"><label>wind</label><input type="range" min="0" max="100" data-bus="wind" /></div>
          <div class="slider-row"><label>nature</label><input type="range" min="0" max="100" data-bus="ambience" /></div>
          <div class="slider-row"><label>music</label><input type="range" min="0" max="100" data-bus="bgm" /></div>
          <div class="panel-buttons" style="margin-top: 20px;">
            <button id="btn-settings-back">back</button>
          </div>
        </div>
      </div>
    </div>

    <div id="touch-ui">
      <div class="stick" id="stick-left"><div class="nub"></div></div>
      <div class="stick" id="stick-right"><div class="nub"></div></div>
      <div class="touch-btns">
        <button id="tb-pause" aria-label="Pause">&#10073;&#10073;</button>
        <button id="tb-reset" aria-label="Reset drone">&#10227;</button>
      </div>
    </div>
    <div id="rotate-hint"><span class="turn">&#8634;</span>rotate your device</div>

    <!-- Fullscreen toggle: one small corner control, lives on every overlay
         screen (menu / paused / settings), hidden while flying. -->
    <button id="btn-fs" class="fs-toggle" aria-label="Toggle fullscreen">
      <svg class="fs-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8V3h5" /><path d="M16 3h5v5" /><path d="M21 16v5h-5" /><path d="M8 21H3v-5" />
      </svg>
      <svg class="fs-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display: none">
        <path d="M8 3v5H3" /><path d="M21 8h-5V3" /><path d="M16 21v-5h5" /><path d="M3 16h5v5" />
      </svg>
      <span>fullscreen</span>
    </button>

    <div id="boot">
      <div id="boot-inner">
        <div id="boot-brand">
          <img id="boot-wordmark" src="./branding/akash-logo-text.png" alt="Akash logo" />
        </div>
        <div id="boot-sub">warming up the meadow</div>
        <div id="boot-alpha">alpha build</div>
        <div id="boot-track"><div id="boot-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
