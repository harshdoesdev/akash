<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sora sanpo — 空さんぽ</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0a0a0a;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      #app { position: fixed; inset: 0; }
      #hud {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #fff;
        font-size: 13px;
        line-height: 1.7;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        user-select: none;
        pointer-events: none;
      }
      #controls {
        position: fixed;
        bottom: 16px;
        left: 16px;
        color: rgba(255, 255, 255, 0.75);
        font-size: 12px;
        line-height: 1.7;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        user-select: none;
        pointer-events: none;
      }
      /* Boot screen: the game's own day-sky palette, gone in a breath. */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #2e6ac8 0%, #9fd2e8 58%, #d7e7cf 100%);
        font-family: ui-rounded, "Hiragino Maru Gothic ProN", Quicksand, Avenir, sans-serif;
        transition: opacity 0.9s ease;
        user-select: none;
      }
      #boot.boot-done { opacity: 0; pointer-events: none; }
      #boot-inner { text-align: center; }
      #boot-kana {
        font-size: 15px;
        letter-spacing: 0.5em;
        margin-left: 0.5em; /* recenter the letter-spaced kana */
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 8px;
      }
      #boot-title {
        font-size: 34px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: #ffffff;
        text-shadow: 0 2px 18px rgba(46, 106, 200, 0.5);
        margin-bottom: 10px;
      }
      #boot-sub {
        font-size: 12px;
        letter-spacing: 0.24em;
        color: rgba(255, 255, 255, 0.88);
        margin-bottom: 28px;
      }
      #boot-track {
        width: 190px;
        height: 4px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.35);
        border-radius: 99px;
        overflow: hidden;
      }
      #boot-fill {
        width: 100%;
        height: 100%;
        background: #fff;
        border-radius: 99px;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.25s ease;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="controls">
      W/S forward/back &nbsp; A/D turn &nbsp; ←/→ strafe &nbsp; SPACE up &nbsp; SHIFT down &nbsp; R reset &nbsp; M sound &nbsp; N (hold) time
    </div>
    <div id="boot">
      <div id="boot-inner">
        <div id="boot-kana">空さんぽ</div>
        <div id="boot-title">sora sanpo</div>
        <div id="boot-sub">warming up the meadow</div>
        <div id="boot-track"><div id="boot-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
